name: Deploy Supabase Edge Function

# Deploys an edge function from repo source to the PRODUCTION Supabase project.
#
# Auto-runs on merge to main when this workflow or the trigger-automation
# function changes. Can also be run manually (Actions tab → Run workflow) to
# deploy any function by name.
#
# Requires a repo secret named BASE_ACCESS_TOKEN = a Supabase access token (sbp_...).

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Edge function folder name to deploy'
        required: false
        default: 'trigger-automation'
      verify_jwt:
        description: 'Require a JWT? true for normal functions, false for public webhooks'
        required: false
        default: 'true'
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-edge-function.yml'
      - 'supabase/functions/trigger-automation/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # GitHub secret BASE_ACCESS_TOKEN -> the env var the Supabase CLI expects.
      SUPABASE_ACCESS_TOKEN: ${{ secrets.BASE_ACCESS_TOKEN }}
      PROJECT_REF: zvoijyneresvkadpprel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy function
        run: |
          set -euo pipefail
          FUNC="${{ github.event.inputs.function_name || 'trigger-automation' }}"
          VJWT="${{ github.event.inputs.verify_jwt || 'true' }}"
          FLAG=""
          if [ "$VJWT" = "false" ]; then FLAG="--no-verify-jwt"; fi
          echo "Deploying '$FUNC' to project $PROJECT_REF (verify_jwt=$VJWT)"
          supabase functions deploy "$FUNC" --project-ref "$PROJECT_REF" $FLAG
