name: Deploy Supabase Edge Function

# Deploys edge functions from repo source to the PRODUCTION Supabase project.
#
# - On merge to main: auto-deploys every function whose files changed in the
#   merge (verify_jwt is read per-function from supabase/config.toml).
# - Manual (Actions tab → Run workflow): deploy any single function by name.
#
# Requires a repo secret named BASE_ACCESS_TOKEN = a Supabase access token (sbp_...).

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Edge function folder name to deploy'
        required: false
        default: 'trigger-automation'
      verify_jwt:
        description: 'Require a JWT? true for normal functions, false for public webhooks'
        required: false
        default: 'true'
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-edge-function.yml'
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.BASE_ACCESS_TOKEN }}
      PROJECT_REF: zvoijyneresvkadpprel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Determine functions to deploy
        id: funcs
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "list=${{ github.event.inputs.function_name }}" >> "$GITHUB_OUTPUT"
          else
            # Functions whose files changed in this push.
            CHANGED=$(git diff --name-only HEAD^ HEAD -- 'supabase/functions/**' \
              | sed -E 's#supabase/functions/([^/]+)/.*#\1#' \
              | grep -v '^_shared$' | sort -u | tr '\n' ' ')
            echo "Changed functions: $CHANGED"
            echo "list=$CHANGED" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy
        run: |
          set -euo pipefail
          FUNCS="${{ steps.funcs.outputs.list }}"
          if [ -z "${FUNCS// }" ]; then echo "No functions to deploy."; exit 0; fi
          for FUNC in $FUNCS; do
            # Read verify_jwt for this function from config.toml (default true).
            VJWT=$(awk -v sec="[functions.$FUNC]" '
              $0==sec {found=1; next}
              found && /^\[/ {exit}
              found && /verify_jwt/ {print $3; exit}' supabase/config.toml)
            VJWT="${VJWT:-true}"
            FLAG=""
            if [ "$VJWT" = "false" ]; then FLAG="--no-verify-jwt"; fi
            echo "::group::Deploying $FUNC (verify_jwt=$VJWT)"
            supabase functions deploy "$FUNC" --project-ref "$PROJECT_REF" $FLAG
            echo "::endgroup::"
          done
